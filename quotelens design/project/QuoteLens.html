<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>QuoteLens — 8-screen flow</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=2"/>
<style>
html, body { margin: 0; padding: 0; background: #F4F1EA; font-family: 'Inter', system-ui, sans-serif; color: #131623; height: 100%; }
#root { height: 100vh; }
</style>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <rect width="200" height="200" fill="#0A0A0A"/>
    <ellipse cx="100" cy="100" rx="60" ry="40" fill="#0A0A0A" stroke="#6EE7B7" stroke-width="3"/>
    <ellipse cx="100" cy="100" rx="28" ry="28" fill="#6EE7B7"/>
    <ellipse cx="100" cy="100" rx="5" ry="26" fill="#0A0A0A"/>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="screens-onboarding.jsx"></script>
<script type="text/babel" src="screens-suppliers.jsx"></script>
<script type="text/babel" src="screens-builder.jsx"></script>
<script type="text/babel" src="screens-projects.jsx"></script>

<script type="text/babel" data-presets="react">
const App = () => (
  <DesignCanvas
    title="QuoteLens"
    subtitle="Dark B2B SaaS · supplier cost intelligence · 8-screen prototype"
  >
    <DCSection id="auth" title="01 · Authentication">
      <DCArtboard id="login" label="Login" width={1280} height={820}>
        <ScreenLogin/>
      </DCArtboard>
    </DCSection>

    <DCSection id="onboarding" title="02 · Onboarding (3 steps)">
      <DCArtboard id="industry" label="Step 1 — Industry" width={1280} height={820}>
        <ScreenIndustry/>
      </DCArtboard>
      <DCArtboard id="project" label="Step 2 — Project & stages" width={1280} height={820}>
        <ScreenProject/>
      </DCArtboard>
      <DCArtboard id="supplier-setup" label="Step 3 — First supplier" width={1280} height={820}>
        <ScreenSupplierSetup/>
      </DCArtboard>
    </DCSection>

    <DCSection id="multi" title="03 · Multi-project workspace">
      <DCArtboard id="projects" label="Projects overview" width={1440} height={900}>
        <ScreenProjects/>
      </DCArtboard>
      <DCArtboard id="project-setup" label="New project — pick suppliers" width={1440} height={1000}>
        <ScreenProjectSetup/>
      </DCArtboard>
      <DCArtboard id="suppliers-global" label="Global supplier network" width={1440} height={900}>
        <ScreenSuppliersGlobal/>
      </DCArtboard>
    </DCSection>

    <DCSection id="app" title="04 · Project workspace (SPRKS)">
      <DCArtboard id="suppliers" label="Suppliers (project view)" width={1440} height={900}>
        <ScreenSuppliers/>
      </DCArtboard>
      <DCArtboard id="supplier-detail" label="Supplier detail (panel)" width={1440} height={900}>
        <ScreenSupplierDetail/>
      </DCArtboard>
    </DCSection>

    <DCSection id="builder" title="05 · Cost intelligence">
      <DCArtboard id="cost-builder" label="Cost Builder" width={1600} height={1100}>
        <ScreenCostBuilder/>
      </DCArtboard>
      <DCArtboard id="scenarios" label="Scenarios comparison" width={1600} height={1000}>
        <ScreenScenarios/>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
